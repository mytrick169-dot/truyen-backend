services:
  - type: web
    name: truyen-hay-phai-doc
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Các biến DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DB_PORT, DB_SSL
      # sẽ được điền thủ công trên dashboard Render
